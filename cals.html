<!DOCTYPE html>
<html>
<head>
<title>FD Calculator</title>

<style>
*{
    box-sizing:border-box;
    font-family:Poppins, Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
    background:white;
    width:350px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px #333;
}

h2{
    text-align:center;
    color:#444;
}

label{
    display:block;
    margin-top:10px;
}

input, select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid gray;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#667eea;
    color:white;
    border:0;
    border-radius:8px;
    font-size:16px;
}

button:hover{
    background:#764ba2;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:18px;
    color:green;
}

</style>

</head>

<body>

<div class="card">

<h2>FD Calculator</h2>

<label>Deposit Amount</label>
<input type="number" id="amount">

<label>Interest Rate (%)</label>
<input type="number" id="rate">

<label>Years</label>
<input type="number" id="year">


<label>Compounding</label>
<select id="compound">
<option value="1">Yearly</option>
<option value="4">Quarterly</option>
<option value="12">Monthly</option>
</select>


<button onclick="calculate()">Calculate</button>

<div id="result"></div>

</div>


<script>

function calculate(){

let p = Number(document.getElementById("amount").value);
let r = Number(document.getElementById("rate").value);
let t = Number(document.getElementById("year").value);
let n = Number(document.getElementById("compound").value);


let maturity = p * Math.pow((1 + r/(100*n)), n*t);

let interest = maturity - p;


document.getElementById("result").innerHTML =
"Interest : ₹" + interest.toFixed(2) +
"<br>Maturity Amount : ₹" + maturity.toFixed(2);

}

</script>


</body>
</html>
